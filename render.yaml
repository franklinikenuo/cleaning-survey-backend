services:
  - type: web
    name: cleaning-survey-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./cleaning_survey.db
      - key: ALLOWED_ORIGINS
        value: https://franklinkenuo.github.io,http://localhost:3000

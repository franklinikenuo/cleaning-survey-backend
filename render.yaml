# force rebuild
services:
  - type: web
    name: cleaning-survey-api-v2
    runtime: python
    plan: free

    buildCommand: |
      apt-get update && apt-get install -y libfreetype6-dev libjpeg-dev
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.12
